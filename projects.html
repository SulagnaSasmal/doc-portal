<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Sulagna Sasmal · Documentation Portfolio</title>
  <meta name="description" content="25 documentation projects: API references, SDK guides, tutorials, enterprise docs, compliance training, and AI tools by Sulagna Sasmal." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📚</text></svg>" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <script src="assets/js/theme.js"></script>
  <style>
    .page-hero{border-bottom:1px solid var(--border-light);padding:2.5rem 0 2rem;background:var(--bg-card);}
    .page-hero .container{max-width:var(--content-max);margin:0 auto;padding:0 1.5rem;}
    .page-hero h1{font-family:var(--font-display);font-size:var(--text-3xl);font-weight:800;color:var(--text);letter-spacing:-0.03em;}
    .page-hero p{font-size:var(--text-base);color:var(--text-secondary);margin-top:0.4rem;}
    .hero-meta{display:flex;align-items:center;gap:1.5rem;margin-top:1rem;flex-wrap:wrap;}
    .hero-stat{font-size:var(--text-sm);color:var(--text-muted);}
    .hero-stat strong{color:var(--amber);font-weight:700;}
    .projects-main{padding:2rem 0 5rem;}
    .projects-main .container{max-width:var(--content-max);margin:0 auto;padding:0 1.5rem;}
    .controls{margin-bottom:2rem;display:flex;flex-direction:column;gap:1rem;}
    .search-wrap{position:relative;max-width:520px;}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;width:16px;height:16px;}
    #q{width:100%;padding:0.6rem 2.5rem 0.6rem 2.5rem;font-size:var(--text-sm);font-family:var(--font-body);border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-card);color:var(--text);outline:none;transition:border-color var(--duration),box-shadow var(--duration);}
    #q:focus{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-ring);}
    #q::placeholder{color:var(--text-muted);}
    .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:var(--border);color:var(--text-secondary);font-size:12px;display:flex;align-items:center;justify-content:center;transition:background var(--duration);}
    .search-clear:hover{background:var(--border-light);}
    .search-clear.hidden{display:none;}
    .filter-row{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;}
    .chip{display:inline-flex;align-items:center;gap:0.3rem;padding:0.32rem 0.8rem;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:500;white-space:nowrap;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;transition:all 0.15s;line-height:1;}
    .chip:hover{border-color:var(--amber);color:var(--text);}
    .chip.active{background:var(--amber);border-color:var(--amber);color:#fff;}
    .chip .cn{font-size:0.65rem;font-weight:700;opacity:0.75;background:rgba(0,0,0,0.12);border-radius:99px;padding:0.1rem 0.38rem;min-width:1.3rem;text-align:center;}
    .chip.active .cn{background:rgba(255,255,255,0.25);opacity:1;}
    .results-bar{display:flex;align-items:center;gap:1rem;}
    #count{font-size:var(--text-sm);color:var(--text-muted);}
    .reset-btn{font-size:var(--text-sm);color:var(--amber);font-weight:500;padding:0.25rem 0;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
    .reset-btn.hidden{display:none;}
    #grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;}
    #grid[hidden]{display:none;}
    @media(max-width:1024px){#grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:640px){#grid{grid-template-columns:1fr;}}
    .project-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow var(--duration),transform var(--duration),border-color var(--duration);}
    .project-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px);border-color:var(--border);}
    .card-accent{height:3px;background:var(--tc,var(--amber));flex-shrink:0;}
    .card-body{padding:1.2rem 1.25rem 1.1rem;display:flex;flex-direction:column;flex:1;}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;margin-bottom:0.75rem;}
    .type-badge{display:inline-flex;align-items:center;padding:0.2rem 0.6rem;border-radius:var(--radius-full);font-size:0.66rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
    .card-live{font-size:0.72rem;font-weight:600;color:var(--text-muted);padding:0.2rem 0.55rem;border:1px solid var(--border-light);border-radius:var(--radius-full);white-space:nowrap;flex-shrink:0;text-decoration:none;transition:color var(--duration),border-color var(--duration);}
    .card-live:hover{color:var(--amber);border-color:var(--amber);}
    .card-title{font-family:var(--font-display);font-size:0.975rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:0.2rem;}
    .card-sub{font-size:var(--text-xs);font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.65rem;}
    .card-desc{font-size:var(--text-sm);color:var(--text-secondary);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1;margin-bottom:1rem;}
    .card-techs{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.85rem;}
    .tech-chip{font-size:0.67rem;font-weight:500;padding:0.14rem 0.48rem;border-radius:var(--radius-sm);background:var(--bg-subtle);color:var(--text-secondary);border:1px solid var(--border-light);}
    .card-footer{display:flex;align-items:center;padding-top:0.75rem;border-top:1px solid var(--border-light);margin-top:auto;}
    .card-stats{display:flex;gap:0;flex-wrap:wrap;}
    .stat-pill{font-size:0.67rem;color:var(--text-muted);font-weight:500;}
    .stat-pill+.stat-pill::before{content:' · ';color:var(--border);}
    #empty{text-align:center;padding:4rem 1rem;}
    #empty[hidden]{display:none;}
    .empty-icon{font-size:2.5rem;margin-bottom:1rem;}
    .empty-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:700;color:var(--text);margin-bottom:0.4rem;}
    .empty-sub{font-size:var(--text-sm);color:var(--text-muted);margin-bottom:1.5rem;}
    .empty-reset{padding:0.6rem 1.5rem;background:var(--amber);color:#fff;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;cursor:pointer;border:none;transition:background var(--duration);}
    .empty-reset:hover{background:var(--amber-hover);}
  </style>
</head>
<body>

<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">DOC Portal</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="projects.html" class="nav-link active">Projects</a>
      <a href="https://sulagnasasmal.github.io/ai-doc-tools/" class="nav-link nav-link-external" target="_blank" rel="noopener">AI Tools ↗</a>
      <a href="https://sulagnasasmal.com/" class="nav-link nav-link-external" target="_blank" rel="noopener">Portfolio</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <h1>All Projects</h1>
    <p>API references, SDK guides, tutorials, enterprise documentation, compliance training, and AI tools.</p>
    <div class="hero-meta">
      <span class="hero-stat"><strong id="total-count">25</strong> projects</span>
      <span class="hero-stat"><strong>7</strong> documentation phases</span>
      <span class="hero-stat"><strong>5</strong> AI tools</span>
    </div>
  </div>
</div>

<main class="projects-main">
  <div class="container">
    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/></svg>
        <input type="search" id="q" placeholder="Search by title, technology, or keyword…" autocomplete="off" />
        <button class="search-clear hidden" id="q-clear" aria-label="Clear">×</button>
      </div>
      <div class="filter-row" id="chips" role="group" aria-label="Filter by type"></div>
      <div class="results-bar">
        <span id="count"></span>
        <button class="reset-btn hidden" id="reset-btn">Clear filters</button>
      </div>
    </div>
    <div id="grid" role="list" aria-label="Documentation projects"></div>
    <div id="empty" hidden>
      <div class="empty-icon">🔍</div>
      <p class="empty-title">No projects found</p>
      <p class="empty-sub">Try a different keyword or remove the active filter.</p>
      <button class="empty-reset" onclick="resetAll()">Show all projects</button>
    </div>
  </div>
</main>

<script>
var TM={
  'api':        {l:'API Reference',    c:'#d97706',b:'rgba(217,119,6,0.12)'  },
  'sdk':        {l:'SDK Docs',         c:'#4c6ef5',b:'rgba(76,110,245,0.12)' },
  'admin':      {l:'Admin Guide',      c:'#0d9488',b:'rgba(13,148,136,0.12)' },
  'onboarding': {l:'Onboarding',       c:'#0284c7',b:'rgba(2,132,199,0.12)'  },
  'tutorial':   {l:'Tutorial',         c:'#059669',b:'rgba(5,150,105,0.12)'  },
  'training':   {l:'Training',         c:'#7c3aed',b:'rgba(124,58,237,0.12)' },
  'kb':         {l:'Knowledge Base',   c:'#1d4ed8',b:'rgba(29,78,216,0.12)'  },
  'enterprise': {l:'Enterprise Docs',  c:'#475569',b:'rgba(71,85,105,0.12)'  },
  'ai-tool':    {l:'AI Tool',          c:'#6d28d9',b:'rgba(109,40,217,0.12)' },
  'strategy':   {l:'Content Strategy', c:'#ea580c',b:'rgba(234,88,12,0.12)'  }
};
var ALL=[],AT='all',SQ='';
var ORDER=['api','sdk','admin','onboarding','tutorial','training','kb','enterprise','ai-tool','strategy'];

function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function match(p){
  if(AT!=='all'&&p.type_key!==AT)return false;
  if(SQ){var idx=[p.title,p.subtitle,p.description,p.type,p.industry].concat(p.techs||[]).join(' ').toLowerCase();return SQ.trim().split(/\s+/).every(function(w){return idx.indexOf(w)>=0;});}
  return true;
}

function buildChips(){
  var cnt={};ALL.forEach(function(p){cnt[p.type_key]=(cnt[p.type_key]||0)+1;});
  var c=document.getElementById('chips');c.innerHTML='';
  function chip(key,label,count){
    var b=document.createElement('button');
    b.className='chip'+(AT===key?' active':'');b.dataset.type=key;
    b.innerHTML=e(label)+' <span class="cn">'+count+'</span>';
    b.onclick=function(){AT=key;apply();};c.appendChild(b);
  }
  chip('all','All',ALL.length);
  ORDER.forEach(function(k){if(cnt[k]){var m=TM[k]||{l:k};chip(k,m.l,cnt[k]);}});
}

function refreshChips(){document.querySelectorAll('.chip').forEach(function(b){b.classList.toggle('active',b.dataset.type===AT);});}

function card(p){
  var m=TM[p.type_key]||{l:p.type,c:'#888',b:'rgba(136,136,136,0.1)'};
  var live=p.live_url?'<a href="'+e(p.live_url)+'" class="card-live" target="_blank" rel="noopener">View →</a>':'';
  var techs=(p.techs||[]).slice(0,5).map(function(t){return'<span class="tech-chip">'+e(t)+'</span>';}).join('');
  var stats=[p.stats&&p.stats.label1,p.stats&&p.stats.label2].filter(Boolean).map(function(s){return'<span class="stat-pill">'+e(s)+'</span>';}).join('');
  var el=document.createElement('article');
  el.className='project-card';el.setAttribute('role','listitem');el.dataset.type=p.type_key;
  el.innerHTML=
    '<div class="card-accent" style="--tc:'+m.c+'"></div>'+
    '<div class="card-body">'+
      '<div class="card-top"><span class="type-badge" style="background:'+m.b+';color:'+m.c+'">'+e(m.l)+'</span>'+live+'</div>'+
      '<h3 class="card-title">'+e(p.title)+'</h3>'+
      '<p class="card-sub">'+e(p.subtitle)+'</p>'+
      '<p class="card-desc">'+e(p.description)+'</p>'+
      '<div class="card-techs">'+techs+'</div>'+
      '<div class="card-footer"><div class="card-stats">'+stats+'</div></div>'+
    '</div>';
  return el;
}

function apply(){
  refreshChips();
  var g=document.getElementById('grid');g.innerHTML='';
  var vis=ALL.filter(match);
  vis.forEach(function(p){g.appendChild(card(p));});
  document.getElementById('count').textContent=(AT==='all'&&!SQ)?ALL.length+' projects':vis.length+' of '+ALL.length+' projects';
  var filt=AT!=='all'||SQ.length>0;
  document.getElementById('reset-btn').classList.toggle('hidden',!filt);
  document.getElementById('empty').hidden=vis.length>0;
  g.hidden=vis.length===0;
}

function resetAll(){AT='all';SQ='';document.getElementById('q').value='';document.getElementById('q-clear').classList.add('hidden');apply();}
document.getElementById('reset-btn').addEventListener('click',resetAll);
var st;
document.getElementById('q').addEventListener('input',function(){
  clearTimeout(st);SQ=this.value.toLowerCase();
  document.getElementById('q-clear').classList.toggle('hidden',!this.value);
  st=setTimeout(apply,160);
});
document.getElementById('q-clear').addEventListener('click',function(){document.getElementById('q').value='';SQ='';this.classList.add('hidden');apply();});

fetch('data/projects.json').then(function(r){return r.json();}).then(function(d){
  ALL=d.projects||[];
  document.getElementById('total-count').textContent=ALL.length;
  buildChips();apply();
}).catch(function(){document.getElementById('count').textContent='Could not load projects.';});
</script>
</body>
</html>
